#############################################################
## JOB DESCRIPTION                                         ##
#############################################################

# Minimization and Equilibration of 
# 4PTI  in a Water Box


#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################

structure          4PTI_wb.psf
coordinates        4PTI_wb.pdb


set temperature    300
set outputname     4PTI_wb_eq

firsttimestep      0


#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################

# Input
paraTypeCharmm	    on
parameters          par_all36_prot.prm
parameters          toppar_water_ions_namd_prot.str
temperature         $temperature


# Force-Field Parameters
exclude             scaled1-4
1-4scaling          1.0
cutoff              12.0
switching           on
switchdist          8.0
pairlistdist        13.5
margin              0.0


# Integrator Parameters
#numsteps            1000
timestep            1.0  ;# 1fs/step
rigidBonds          all  ;# needed for 2fs steps
nonbondedFreq       1
fullElectFrequency  2  
stepspercycle       20


# Constant Temperature Control
langevin            on    ;# do langevin dynamics
langevinDamping     1     ;# damping coefficient (gamma) of 1/ps
langevinTemp        $temperature
langevinHydrogen    off    ;# don't couple langevin bath to hydrogens

rescaleFreq         100
rescaleTemp         300


# Periodic Boundary Conditions
cellBasisVector1    41.0    0.0   0.0
cellBasisVector2     0.0   41.0   0.0
cellBasisVector3     0.0    0.0  41.0
cellOrigin          14.211987495422363 21.89864730834961 6.670727729797363

wrapAll             on


# PME (for full-system periodic electrostatics)
PME                 yes
PMEGridSpacing      1.0

#manual grid definition
#PMEGridSizeX        28.6
#PMEGridSizeY        28.6
#PMEGridSizeZ        28.6


# Constant Pressure Control (variable volume)
useGroupPressure      yes ;# needed for rigidBonds
useFlexibleCell       no
useConstantArea       no
useConstantRatio      no

LangevinPiston        on
LangevinPistonTarget  1.01325 ;#  in bar -> 1 atm
langevinPistonPeriod  200.0
langevinPistonDecay   100.0
langevinPistonTemp    $temperature


# Output
outputName          $outputname

restartfreq         1000     ;# 500steps = every 1ps
dcdfreq             100
xstFreq             100
outputEnergies      100
outputPressure      100


#############################################################
## EXTRA PARAMETERS                                        ##
#############################################################


#############################################################
## EXECUTION SCRIPT                                        ##
#############################################################

# Minimization
minimize            500
reinitvels          $temperature

run 1000000 ;# 50ps



